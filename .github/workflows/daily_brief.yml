name: Scheduled Daily Brief Delivery

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      force_generation:
        description: 'Force brief generation even if duplicate exists for today'
        required: false
        default: 'false'

jobs:
  deliver-brief:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Serverless Daily Brief Generation
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        BROADCAST_CHAT_ID: ${{ secrets.BROADCAST_CHAT_ID }}
        TIMEZONE: Asia/Kolkata
      run: |
        python run_daily.py
